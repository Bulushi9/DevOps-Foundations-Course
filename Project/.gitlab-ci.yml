stages:
  - install
  - build
  - test
  - deploy

variables:
  DOCKER_IMAGE: "your-docker-hub-username/calculator-app" # Replace with your Docker Hub repo
  NODE_ENV: production

frontend-job:
  stage: build
  image: node:16
  script:
    - echo "Installing frontend dependencies..."
    - npm install
    - echo "Building the React frontend..."
    - npm run build
  artifacts:
    paths:
      - build/

backend-job:
  stage: test
  image: python:3.9-slim
  script:
    - echo "Installing backend dependencies..."
    - pip install -r requirements.txt
    - echo "Running backend tests..."
    - pytest

docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "Building Docker images..."
    - docker build -t $DOCKER_IMAGE-frontend ./frontend
    - docker build -t $DOCKER_IMAGE-backend ./backend
    - echo "Pushing Docker images to Docker Hub..."
    - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
    - docker push $DOCKER_IMAGE-frontend
    - docker push $DOCKER_IMAGE-backend
  only:
    - main

# OPTIONAL: Define a deployment job (if applicable)
deploy:
  stage: deploy
script:
    - echo "Deploying application..."
    - echo "Deployment steps go here, e.g., SSH to server or Kubernetes commands."
